<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bolão Brasil - Copa do Mundo 2026 - Faça seus palpites sobre os jogos da Brasil na Copa do Mundo 2026!">
  <title>Bolão Brasil – Copa do Mundo 2026</title>
  
  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- External Libraries (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lzstring.min.js"></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/print.css">
</head>
<body>
  <!-- Header -->
  <header>
    <button class="theme-toggle" data-theme-toggle aria-label="Alternar tema" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <span class="header-flag" aria-hidden="true">🇧🇷</span>
    <div class="header-badge">⚽ Copa do Mundo 2026</div>
    <h1>BOLÃO <span>BRASIL</span></h1>
    <p class="header-sub">Grupo C · EUA, Canadá e México · Junho–Julho 2026</p>
    <div class="name-section">
      <label for="participantName" class="visually-hidden">Seu nome no bolão</label>
      <div class="name-input-wrap">
        <span aria-hidden="true">👤</span>
        <input type="text" id="participantName" placeholder="Seu nome no bolão..." maxlength="30" aria-label="Nome do participante">
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="content" role="main">
    <!-- Group Phase Section -->
    <section aria-labelledby="group-phase-title">
      <h2 id="group-phase-title" class="section-title">Fase de Grupos</h2>
      <div id="matches-container">
        <!-- Matches will be rendered here by JS -->
      </div>
    </section>

    <!-- Points Section -->
    <section aria-labelledby="points-title">
      <h2 id="points-title" class="section-title" style="margin-top:1.5rem">Pontuação</h2>
      <div class="points-section">
        <p class="points-title">Tabela de Pontos</p>
        <div class="points-grid">
          <div class="points-item"><span class="points-label">Resultado correto (V/E/D)</span><span class="points-val">1 pt</span></div>
          <div class="points-item"><span class="points-label">Placar exato</span><span class="points-val">3 pts</span></div>
        </div>
        <div class="total-bar">
          <span class="total-label">Pontos Possíveis</span>
          <span class="total-score">9 pts</span>
        </div>
      </div>
    </section>

    <!-- Action Buttons -->
    <div class="btn-row no-print" style="margin-top:1.5rem">
      <button class="print-btn" type="button" onclick="printBolao()" aria-label="Imprimir bolão">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimir Bolão
      </button>
      <button class="print-btn gold" type="button" onclick="exportAsImage()" aria-label="Salvar bolão como imagem">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Salvar como Imagem
      </button>
      <button class="print-btn gold" type="button" onclick="shareBolao()" aria-label="Compartilhar palpites">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Compartilhar
      </button>
      <button class="print-btn secondary" type="button" onclick="clearAll()" aria-label="Limpar todos os palpites">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        Limpar palpites
      </button>
    </div>
  </main>

  <!-- App Script -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
